{% extends 'base.html' %}
{% block title %}Merge PDF Forms - My PDF{% endblock %}

{% block content %}
<div class="text-center mb-4">
    <h1 class="text-gradient">Merge PDF</h1>
    <p class="text-muted">Combine your PDFs in the exact order you want.</p>
</div>

<div class="upload-container">
    <form id="merge-form" action="/merge" method="POST" enctype="multipart/form-data">
        <div id="pdf-blocks-container" class="file-list">
            <!-- Dynamic PDF Upload Blocks will be injected here -->
        </div>

        <div class="text-center mt-4">
            <button type="button" id="add-pdf-btn" class="btn btn-secondary">
                <i class="fa-solid fa-plus"></i> Add Another Document
            </button>
        </div>

        <div class="text-center" style="margin-top: 2rem;">
            <button type="submit" id="submit-btn" class="btn btn-primary" style="padding: 1rem 3rem; font-size: 1.25rem;">
                <span class="btn-text">Merge PDFs</span>
                <svg class="spinner hidden" viewBox="0 0 50 50" style="width: 20px; height: 20px;">
                    <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5" stroke="#fff"></circle>
                </svg>
            </button>
        </div>
    </form>
</div>

<!-- Template for a PDF Block -->
<template id="pdf-block-template">
    <div class="file-item pdf-block">
        <div class="drag-handle" style="cursor: grab; color: var(--text-muted); padding: 0.5rem;">
            <i class="fa-solid fa-grip-vertical"></i>
        </div>
        
        <div class="file-input-wrapper" style="flex: 1; display: flex; align-items: center; gap: 1rem;">
            <label class="btn btn-secondary small-btn" style="cursor: pointer; margin: 0;">
                <i class="fa-solid fa-folder-open"></i> Choose PDF
                <input type="file" class="pdf-file-input hidden" accept="application/pdf" required>
            </label>
            <span class="file-name text-muted" style="flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">No file chosen</span>
        </div>
        
        <div class="range-wrapper" style="display: flex; align-items: center; gap: 0.5rem; margin: 0 1rem;">
            <label style="font-size: 0.85rem; color: var(--text-muted);">Pages:</label>
            <input type="text" class="range-input" placeholder="e.g. 1-5, 8" style="padding: 0.5rem; border: 1px solid var(--border); border-radius: var(--radius-sm); outline: none; width: 120px;">
        </div>

        <button type="button" class="btn-icon remove-block-btn" title="Remove PDF">
            <i class="fa-solid fa-trash"></i>
        </button>
    </div>
</template>
{% endblock %}

{% block extra_scripts %}
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script src="{{ url_for('static', filename='js/merge.js') }}"></script>
{% endblock %}
