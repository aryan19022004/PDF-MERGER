{% extends 'base.html' %}
{% block title %}Split PDF - My PDF{% endblock %}

{% block content %}
<div class="text-center mb-4">
    <h1 class="text-gradient">Split PDF</h1>
    <p class="text-muted">Separate one page or a whole set for easy conversion into independent PDF files.</p>
</div>

<div class="upload-container">
    <div id="split-upload-zone" class="upload-zone">
        <i class="fa-solid fa-file-pdf"></i>
        <h3>Choose PDF file</h3>
        <p class="text-muted">or drop PDF here</p>
        <input type="file" id="split-file-input" accept="application/pdf" class="hidden">
    </div>

    <form id="split-form" action="/split" method="POST" enctype="multipart/form-data" class="hidden mt-4">
        <!-- We keep a cloned file input hidden here to submit native FormData -->
        <input type="file" id="split-form-file" name="pdf_file" class="hidden">

        <div class="file-item mb-4">
            <div class="file-item-info">
                <i class="fa-solid fa-file-pdf" style="color: var(--primary);"></i>
                <span id="split-file-name">Document.pdf</span>
            </div>
            <button type="button" class="btn-icon" id="remove-split-file"><i class="fa-solid fa-trash text-error"></i></button>
        </div>

        <div style="margin-bottom: 2rem;">
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Pages to Extract (e.g. 1-5, 8)</label>
            <input type="text" name="pages" id="split-pages-input" placeholder="Leave empty to extract all pages individually" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 1rem; outline: none;">
        </div>

        <div class="text-center">
            <button type="submit" id="split-submit-btn" class="btn btn-primary" style="padding: 1rem 3rem; font-size: 1.25rem;">
                <span class="btn-text">Split PDF</span>
                <svg class="spinner hidden" viewBox="0 0 50 50" style="width: 20px; height: 20px;">
                    <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5" stroke="#fff"></circle>
                </svg>
            </button>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/split.js') }}"></script>
{% endblock %}
